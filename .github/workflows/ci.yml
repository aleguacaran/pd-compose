name: ci

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: deps
        run: python -m pip install -U pip

      - name: install
        run: python -m pip install -e ".[dev]"

      - name: test
        run: python -m pytest -v
