name: ci

on: pull_request

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: deps
        run: python -m pip install -U pip

      - name: install
        run: python -m pip install -e ".[dev]"

      - name: test
        run: python -m pytest
        env:
          TYPER_USE_RICH: 0
